# Enable Colours
set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Prefix Key
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Open new windows in current directory path
bind c new-window -c "#{pane_current_path}"

# Split Windows
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload Config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# Close current session
bind K confirm-before -p "Cerrar sesión #S? (y/n)" kill-session

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# VIM motions
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Enable Mouse Dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Status Line Position
set-option -g status-position top

##### Plugins #####
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

##### Theme: Minimal Dark #####
set -g status-style bg='#111111',fg='#e8e8e8'
set -g message-style bg='#1a1a1a',fg='#e8e8e8'
set -g message-command-style bg='#1a1a1a',fg='#7dcfff'
set -g pane-border-style fg='#303030'
set -g pane-active-border-style fg='#7aa2f7'
set -g mode-style bg='#7aa2f7',fg='#111111'

set -g status-left-length 40
set -g status-left "#[fg=#111111,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#111111,nobold] "

set -g status-right-length 120
set -g status-right "#[fg=#6b7280,bg=#111111] %Y-%m-%d #[fg=#7dcfff,bg=#111111] %H:%M #[fg=#f7768e,bg=#111111] #(whoami)@#H "

set -g window-status-format "#[fg=#6b7280,bg=#111111] #I #W "
set -g window-status-current-format "#[fg=#111111,bg=#cfcfcf,bold] #I #W #[fg=#111111,bg=#111111,nobold]"
set -g window-status-separator ""
set -g window-status-activity-style fg='#e0af68',bg='#111111'
set -g window-status-bell-style fg='#f7768e',bg='#111111',bold

set -g clock-mode-colour '#7dcfff'
set -g display-panes-colour '#6b7280'
set -g display-panes-active-colour '#7aa2f7'
set -g popup-style bg='#1a1a1a',fg='#e8e8e8'
set -g popup-border-style fg='#303030',bg='#1a1a1a'

##### Neovim CheckHealth Recommendations #####
set-option -sg escape-time 10
set-option -g focus-events on

##### Session Naming #####
# Keep numeric names by default, but rename session "0" to "main".
set-hook -g session-created 'if -F "#{==:#{session_name},0}" "rename-session main"'

##### Pop-Up: Session List #####
# prefix + w opens the built-in session/window chooser
bind w choose-tree -Zw

##### Pop-Up: Scratch Pad #####
# prefix + T opens the scratchpad
unbind -q -T popup Tab
bind T display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh
# Send these keys through to the app instead of closing the popup.
bind -T popup t send-keys t
bind -T popup q send-keys q
bind -T popup T detach
bind -T popup C-[ copy-mode

##### Pop-Up: LazyGit
bind g display-popup -d "#{pane_current_path}" -E -w 80% -h 80% -E lazygit

##### TPM Init #####
run '~/.tmux/plugins/tpm/tpm'
